<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Schema Visualizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0e14;
    --bg2: #12151e;
    --bg3: #181c27;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #6ee7b7;
    --accent2: #818cf8;
    --accent3: #f472b6;
    --accent4: #fb923c;
    --pk: #fbbf24;
    --fk: #60a5fa;
    --table-header: #1e2535;
    --table-bg: #161922;
    --font-mono: 'JetBrains Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg2);
    flex-shrink: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
    color: var(--accent);
    white-space: nowrap;
  }
  .logo span { color: var(--accent2); }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: auto;
    flex-wrap: wrap;
  }

  .upload-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 16px;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .upload-btn:hover { opacity: 0.85; }

  .stats {
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: var(--muted);
  }
  .stat { display: flex; align-items: center; gap: 5px; }
  .stat-val { color: var(--text); font-weight: 600; }

  .controls {
    display: flex;
    gap: 8px;
  }

  .ctrl-btn {
    padding: 6px 12px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .ctrl-btn:hover { background: var(--table-header); border-color: var(--border2); }
  .ctrl-btn.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }

  /* ── Search ── */
  .search-wrap {
    position: relative;
  }
  .search-wrap input {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 5px;
    padding: 6px 10px 6px 28px;
    font-family: var(--font-mono);
    font-size: 11px;
    width: 160px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent2); }
  .search-icon {
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 12px;
    pointer-events: none;
  }

  /* ── Layout ── */
  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    border-right: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 12px 14px 8px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .table-list {
    overflow-y: auto;
    flex: 1;
    padding: 6px 0;
  }
  .table-list::-webkit-scrollbar { width: 4px; }
  .table-list::-webkit-scrollbar-track { background: transparent; }
  .table-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .table-item {
    padding: 6px 14px;
    font-size: 11px;
    cursor: pointer;
    color: var(--muted);
    border-left: 2px solid transparent;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .table-item:hover { color: var(--text); background: var(--bg3); }
  .table-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(110,231,183,0.05); }

  .table-item .ti-icon {
    width: 14px;
    height: 14px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 8px;
  }
  .table-item.active .ti-icon { background: rgba(110,231,183,0.15); border-color: var(--accent); color: var(--accent); }

  .col-count {
    margin-left: auto;
    font-size: 10px;
    color: var(--muted);
    background: var(--bg3);
    padding: 1px 5px;
    border-radius: 3px;
  }

  /* ── Canvas ── */
  .canvas-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  #canvas {
    width: 100%;
    height: 100%;
    cursor: grab;
  }
  #canvas:active { cursor: grabbing; }

  /* ── Drop zone ── */
  .drop-zone {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 10;
  }
  .drop-zone.hidden { display: none; }

  .drop-box {
    border: 2px dashed var(--border2);
    border-radius: 16px;
    padding: 48px 64px;
    text-align: center;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
  }
  .drop-box:hover, .drop-box.drag-over {
    border-color: var(--accent);
    background: rgba(110,231,183,0.04);
  }

  .drop-icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .drop-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }

  .drop-sub {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
  }

  .drop-or {
    font-size: 11px;
    color: var(--muted);
  }

  .paste-area {
    width: 500px;
    max-width: 90vw;
  }

  .paste-area textarea {
    width: 100%;
    height: 120px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 12px;
    resize: none;
    outline: none;
    transition: border-color 0.15s;
  }
  .paste-area textarea:focus { border-color: var(--accent2); }
  .paste-area textarea::placeholder { color: var(--muted); }

  .parse-btn {
    margin-top: 8px;
    width: 100%;
    padding: 9px;
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .parse-btn:hover { opacity: 0.85; }

  /* ── D3 Table Nodes ── */
  .table-node { cursor: pointer; }

  .table-node .node-header {
    fill: var(--table-header);
  }

  .table-node .node-body {
    fill: var(--table-bg);
  }

  .table-node .node-border {
    fill: none;
    stroke: var(--border2);
    stroke-width: 1;
    rx: 8;
  }

  .table-node.highlighted .node-border {
    stroke: var(--accent);
    stroke-width: 1.5;
  }

  .table-node .header-text {
    fill: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
  }

  .table-node .col-name {
    fill: var(--text);
    font-family: var(--font-mono);
    font-size: 10.5px;
  }

  .table-node .col-type {
    fill: var(--muted);
    font-family: var(--font-mono);
    font-size: 10px;
  }

  .table-node .pk-badge {
    fill: var(--pk);
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 600;
  }

  .table-node .fk-badge {
    fill: var(--fk);
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 600;
  }

  /* ── Links ── */
  .link {
    fill: none;
    stroke: rgba(129, 140, 248, 0.25);
    stroke-width: 1.5;
    stroke-dasharray: 4 3;
  }
  .link.highlighted {
    stroke: rgba(110, 231, 183, 0.7);
    stroke-width: 2;
    stroke-dasharray: none;
  }

  /* ── Tooltip ── */
  .tooltip {
    position: absolute;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 11px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 260px;
    z-index: 200;
  }
  .tooltip.show { opacity: 1; }
  .tooltip-title { font-weight: 600; color: var(--accent); margin-bottom: 6px; font-size: 12px; }
  .tooltip-row { display: flex; gap: 8px; margin: 2px 0; }
  .tooltip-key { color: var(--muted); min-width: 60px; }
  .tooltip-val { color: var(--text); }

  /* ── Legend ── */
  .legend {
    position: absolute;
    bottom: 16px;
    right: 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 10px;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .legend-line { width: 20px; height: 2px; border-top: 2px dashed rgba(129,140,248,0.5); flex-shrink: 0; }

  /* ── Minimap ── */
  .minimap {
    position: absolute;
    bottom: 16px;
    left: 16px;
    width: 140px;
    height: 90px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    opacity: 0.7;
  }

  /* ── Zoom indicator ── */
  .zoom-indicator {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--muted);
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── Spinner ── */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #file-input { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">db<span>viz</span></div>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Search tables…" oninput="filterTables(this.value)">
  </div>

  <div class="stats" id="stats" style="display:none">
    <div class="stat"><span class="stat-val" id="stat-tables">0</span> tables</div>
    <div class="stat"><span class="stat-val" id="stat-cols">0</span> columns</div>
    <div class="stat"><span class="stat-val" id="stat-rels">0</span> relations</div>
  </div>

  <div class="controls" id="controls" style="display:none">
    <button class="ctrl-btn active" id="btn-fit" onclick="fitView()">Fit</button>
    <button class="ctrl-btn" id="btn-compact" onclick="toggleLayout('compact')">Compact</button>
    <button class="ctrl-btn" id="btn-cols" onclick="toggleColsDisplay()">Hide types</button>
    <button class="ctrl-btn" onclick="resetHighlight()">Clear</button>
  </div>

  <div class="header-actions">
    <div class="spinner" id="spinner"></div>
    <button class="upload-btn" onclick="document.getElementById('file-input').click()">
      ⊕ Load .sql file
    </button>
  </div>
</header>

<input type="file" id="file-input" accept=".sql,.txt" onchange="loadFile(event)">

<div class="workspace">
  <div class="sidebar">
    <div class="sidebar-header">Tables</div>
    <div class="table-list" id="table-list">
      <div style="padding:24px 14px; font-size:11px; color:var(--muted); line-height:1.7;">
        Load a .sql file to see tables here.
      </div>
    </div>
  </div>

  <div class="canvas-wrap" id="canvas-wrap">
    <div class="drop-zone" id="drop-zone">
      <div class="drop-box" id="drop-box" onclick="document.getElementById('file-input').click()">
        <div class="drop-icon">⬡</div>
        <div class="drop-title">Drop your .sql file here</div>
        <div class="drop-sub">
          Supports CREATE TABLE statements<br>
          Detects primary keys, foreign keys & types
        </div>
      </div>
      <div class="drop-or">— or paste SQL below —</div>
      <div class="paste-area">
        <textarea id="paste-sql" placeholder="CREATE TABLE users (
  id uuid PRIMARY KEY,
  email text UNIQUE,
  ...
);"></textarea>
        <button class="parse-btn" onclick="parsePastedSQL()">Parse SQL →</button>
      </div>
    </div>

    <svg id="canvas"></svg>

    <div class="tooltip" id="tooltip"></div>

    <div class="legend" id="legend" style="display:none">
      <div style="font-weight:600; color:var(--text); margin-bottom:4px; font-size:11px;">Legend</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--pk)"></div> Primary key</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--fk)"></div> Foreign key</div>
      <div class="legend-item"><div class="legend-line"></div> Relationship</div>
    </div>

    <div class="zoom-indicator" id="zoom-ind" style="display:none">100%</div>
  </div>
</div>

<script>
// ── SQL Parser ──────────────────────────────────────────────────
function parseSQL(sql) {
  const tables = [];
  const fkRelations = [];

  // Remove comments
  sql = sql.replace(/--[^\n]*/g, '').replace(/\/\*[\s\S]*?\*\//g, '');

  // Match CREATE TABLE blocks
  const tableRe = /CREATE\s+TABLE\s+(?:IF\s+NOT\s+EXISTS\s+)?(?:public\.|"\w+"\.)?"?(\w+)"?\s*\(([^;]*)\)/gi;
  let tMatch;

  while ((tMatch = tableRe.exec(sql)) !== null) {
    const tableName = tMatch[1];
    const body = tMatch[2];
    const columns = [];
    const constraints = [];

    // Split on commas but respect nested parens
    const parts = splitRespectingParens(body);

    for (let part of parts) {
      part = part.trim();
      if (!part) continue;

      const upperPart = part.toUpperCase();

      // TABLE-level PRIMARY KEY constraint
      if (upperPart.startsWith('CONSTRAINT') && upperPart.includes('PRIMARY KEY')) {
        const pkCols = part.match(/PRIMARY\s+KEY\s*\(([^)]+)\)/i);
        if (pkCols) {
          pkCols[1].split(',').map(c => c.trim().replace(/"/g,'').toLowerCase()).forEach(col => {
            const found = columns.find(c => c.name.toLowerCase() === col);
            if (found) found.isPK = true;
          });
        }
        continue;
      }

      // TABLE-level FOREIGN KEY constraint
      if (upperPart.startsWith('CONSTRAINT') && upperPart.includes('FOREIGN KEY')) {
        const fkMatch = part.match(/FOREIGN\s+KEY\s*\(([^)]+)\)\s+REFERENCES\s+(?:public\.|"\w+"\.)?"?(\w+)"?\s*\(([^)]+)\)/i);
        if (fkMatch) {
          const fromCol = fkMatch[1].trim().replace(/"/g,'');
          const toTable = fkMatch[2].trim();
          const toCol = fkMatch[3].trim().replace(/"/g,'');
          constraints.push({ fromCol, toTable, toCol });
          fkRelations.push({ fromTable: tableName, fromCol, toTable, toCol });
          const found = columns.find(c => c.name.toLowerCase() === fromCol.toLowerCase());
          if (found) found.isFK = true;
        }
        continue;
      }

      // Skip other constraints
      if (upperPart.match(/^\s*(CONSTRAINT|UNIQUE|CHECK|EXCLUDE|PRIMARY KEY|FOREIGN KEY)/)) continue;

      // Column definition
      const colMatch = part.match(/^"?(\w+)"?\s+([^\s,]+(?:\s*\([^)]*\))?(?:\s+(?:WITH|WITHOUT)\s+TIME\s+ZONE)?)/i);
      if (colMatch) {
        const colName = colMatch[1];
        let colType = colMatch[2];

        // Normalize type
        if (part.match(/with\s+time\s+zone/i)) colType = colType.replace(/\s*with\s+time\s+zone/i, '') + ' tz';
        colType = colType.replace(/\s+/g,' ').trim();

        const isPK = /\bPRIMARY\s+KEY\b/i.test(part);
        const isFK = false; // set later from constraints
        const isUnique = /\bUNIQUE\b/i.test(part);
        const isNotNull = /\bNOT\s+NULL\b/i.test(part) || isPK;
        const hasDefault = /\bDEFAULT\b/i.test(part);

        // Extract inline FK references
        const inlineFK = part.match(/REFERENCES\s+(?:public\.|"\w+"\.)?"?(\w+)"?\s*\(([^)]+)\)/i);
        if (inlineFK) {
          fkRelations.push({ fromTable: tableName, fromCol: colName, toTable: inlineFK[1], toCol: inlineFK[2].trim() });
        }

        columns.push({ name: colName, type: colType, isPK, isFK: !!inlineFK, isUnique, isNotNull, hasDefault });
      }
    }

    // Mark FK columns from table-level constraints
    constraints.forEach(c => {
      const found = columns.find(col => col.name.toLowerCase() === c.fromCol.toLowerCase());
      if (found) found.isFK = true;
    });

    tables.push({ name: tableName, columns });
  }

  // Deduplicate relations
  const seen = new Set();
  const uniqueRels = fkRelations.filter(r => {
    const key = `${r.fromTable}.${r.fromCol}->${r.toTable}.${r.toCol}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  return { tables, relations: uniqueRels };
}

function splitRespectingParens(str) {
  const parts = [];
  let depth = 0, current = '';
  for (const ch of str) {
    if (ch === '(') depth++;
    else if (ch === ')') depth--;
    else if (ch === ',' && depth === 0) {
      parts.push(current);
      current = '';
      continue;
    }
    current += ch;
  }
  if (current.trim()) parts.push(current);
  return parts;
}

// ── State ──────────────────────────────────────────────────────
let schema = null;
let simulation = null;
let showTypes = true;
let layoutMode = 'spread';
let highlightedTable = null;
let currentZoom = 1;

const COLOR_MAP = {
  uuid: '#a78bfa', text: '#67e8f9', numeric: '#6ee7b7', boolean: '#f9a8d4',
  integer: '#93c5fd', bigint: '#93c5fd', timestamp: '#fcd34d', date: '#fcd34d',
  jsonb: '#fb923c', json: '#fb923c', bytea: '#e5e7eb', 'user-defined': '#c084fc',
  array: '#f87171', int: '#93c5fd', varchar: '#67e8f9', char: '#67e8f9',
  default: '#6b7280'
};

function typeColor(type) {
  if (!type) return COLOR_MAP.default;
  const t = type.toLowerCase();
  for (const [key, val] of Object.entries(COLOR_MAP)) {
    if (t.startsWith(key)) return val;
  }
  return COLOR_MAP.default;
}

// ── File Loading ───────────────────────────────────────────────
function loadFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => processSQL(e.target.result);
  reader.readAsText(file);
  event.target.value = '';
}

function parsePastedSQL() {
  const sql = document.getElementById('paste-sql').value.trim();
  if (!sql) return;
  processSQL(sql);
}

function processSQL(sql) {
  document.getElementById('spinner').style.display = 'block';
  setTimeout(() => {
    try {
      schema = parseSQL(sql);
      if (schema.tables.length === 0) {
        alert('No CREATE TABLE statements found. Make sure your SQL contains valid table definitions.');
        document.getElementById('spinner').style.display = 'none';
        return;
      }
      document.getElementById('drop-zone').classList.add('hidden');
      document.getElementById('stats').style.display = 'flex';
      document.getElementById('controls').style.display = 'flex';
      document.getElementById('legend').style.display = 'flex';
      document.getElementById('zoom-ind').style.display = 'block';

      document.getElementById('stat-tables').textContent = schema.tables.length;
      document.getElementById('stat-cols').textContent = schema.tables.reduce((a,t) => a + t.columns.length, 0);
      document.getElementById('stat-rels').textContent = schema.relations.length;

      renderSidebar();
      renderDiagram();
    } catch(e) {
      alert('Error parsing SQL: ' + e.message);
    }
    document.getElementById('spinner').style.display = 'none';
  }, 50);
}

// ── Sidebar ────────────────────────────────────────────────────
function renderSidebar(filter = '') {
  const list = document.getElementById('table-list');
  const tables = schema.tables.filter(t => !filter || t.name.toLowerCase().includes(filter.toLowerCase()));
  list.innerHTML = tables.map(t => `
    <div class="table-item ${highlightedTable === t.name ? 'active' : ''}" onclick="highlightTable('${t.name}')">
      <div class="ti-icon">T</div>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.name}</span>
      <span class="col-count">${t.columns.length}</span>
    </div>
  `).join('');
}

function filterTables(val) {
  if (!schema) return;
  renderSidebar(val);
}

// ── D3 Diagram ─────────────────────────────────────────────────
const TABLE_W = 200;
const HEADER_H = 34;
const ROW_H = 22;
const MAX_VISIBLE_ROWS = 15;

function tableHeight(t) {
  const rows = Math.min(t.columns.length, MAX_VISIBLE_ROWS);
  return HEADER_H + rows * ROW_H + (t.columns.length > MAX_VISIBLE_ROWS ? 20 : 4);
}

function renderDiagram() {
  const svg = d3.select('#canvas');
  svg.selectAll('*').remove();

  const wrap = document.getElementById('canvas-wrap');
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;

  svg.attr('width', W).attr('height', H);

  const defs = svg.append('defs');
  defs.append('marker')
    .attr('id', 'arrowhead')
    .attr('viewBox', '0 0 10 10')
    .attr('refX', 8).attr('refY', 5)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto-start-reverse')
    .append('path')
    .attr('d', 'M2 1L8 5L2 9')
    .attr('fill', 'none')
    .attr('stroke', 'rgba(129,140,248,0.5)')
    .attr('stroke-width', 1.5)
    .attr('stroke-linecap', 'round');

  const g = svg.append('g').attr('class', 'main-g');

  // Zoom behavior
  const zoom = d3.zoom()
    .scaleExtent([0.1, 3])
    .on('zoom', (event) => {
      g.attr('transform', event.transform);
      currentZoom = event.transform.k;
      document.getElementById('zoom-ind').textContent = Math.round(currentZoom * 100) + '%';
    });

  svg.call(zoom);

  // Initial positions — grid layout
  const cols = Math.max(1, Math.ceil(Math.sqrt(schema.tables.length * 1.4)));
  const nodes = schema.tables.map((t, i) => ({
    ...t,
    id: t.name,
    x: (i % cols) * (TABLE_W + 80) + 60,
    y: Math.floor(i / cols) * 320 + 60,
    width: TABLE_W,
    height: tableHeight(t),
  }));

  const nodeMap = Object.fromEntries(nodes.map(n => [n.name, n]));

  const links = schema.relations
    .filter(r => nodeMap[r.fromTable] && nodeMap[r.toTable])
    .map(r => ({
      source: nodeMap[r.fromTable],
      target: nodeMap[r.toTable],
      fromCol: r.fromCol,
      toCol: r.toCol,
    }));

  // Force simulation
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(220).strength(0.3))
    .force('charge', d3.forceManyBody().strength(-600))
    .force('collision', d3.forceCollide().radius(d => Math.max(d.width, d.height) / 2 + 40))
    .force('x', d3.forceX(W / 2).strength(0.03))
    .force('y', d3.forceY(H / 2).strength(0.03))
    .alphaDecay(0.03)
    .on('tick', ticked);

  // Draw links
  const linkGroup = g.append('g').attr('class', 'links');
  const linkLines = linkGroup.selectAll('path')
    .data(links)
    .enter().append('path')
    .attr('class', 'link')
    .attr('marker-end', 'url(#arrowhead)')
    .attr('id', (d, i) => `link-${i}`);

  // Draw nodes
  const nodeGroup = g.append('g').attr('class', 'nodes');
  const tableNodes = nodeGroup.selectAll('g.table-node')
    .data(nodes)
    .enter().append('g')
    .attr('class', 'table-node')
    .attr('id', d => `node-${d.name}`)
    .call(d3.drag()
      .on('start', dragStart)
      .on('drag', dragging)
      .on('end', dragEnd))
    .on('click', (event, d) => {
      event.stopPropagation();
      highlightTable(d.name);
    })
    .on('mouseenter', (event, d) => showTooltip(event, d))
    .on('mouseleave', hideTooltip);

  tableNodes.each(function(d) {
    const node = d3.select(this);
    const h = d.height;

    // Shadow/glow rect
    node.append('rect')
      .attr('width', d.width + 4)
      .attr('height', h + 4)
      .attr('x', -2).attr('y', -2)
      .attr('rx', 10)
      .attr('fill', 'rgba(0,0,0,0.3)');

    // Body
    node.append('rect')
      .attr('class', 'node-body')
      .attr('width', d.width)
      .attr('height', h)
      .attr('rx', 8);

    // Header
    node.append('rect')
      .attr('class', 'node-header')
      .attr('width', d.width)
      .attr('height', HEADER_H)
      .attr('rx', 8);
    node.append('rect')
      .attr('class', 'node-header')
      .attr('width', d.width)
      .attr('height', 12)
      .attr('y', HEADER_H - 12);

    // Border
    node.append('rect')
      .attr('class', 'node-border')
      .attr('width', d.width)
      .attr('height', h)
      .attr('rx', 8)
      .attr('stroke', 'rgba(255,255,255,0.08)')
      .attr('stroke-width', 1)
      .attr('fill', 'none');

    // Table name
    node.append('text')
      .attr('class', 'header-text')
      .attr('x', 12)
      .attr('y', HEADER_H / 2 + 1)
      .attr('dominant-baseline', 'central')
      .text(d.name);

    // Column count badge
    node.append('text')
      .attr('x', d.width - 10)
      .attr('y', HEADER_H / 2 + 1)
      .attr('dominant-baseline', 'central')
      .attr('text-anchor', 'end')
      .attr('font-family', 'JetBrains Mono, monospace')
      .attr('font-size', 9)
      .attr('fill', 'rgba(255,255,255,0.3)')
      .text(`${d.columns.length}c`);

    // Columns
    const visible = d.columns.slice(0, MAX_VISIBLE_ROWS);
    visible.forEach((col, i) => {
      const y = HEADER_H + i * ROW_H + ROW_H / 2;

      // Row hover bg
      node.append('rect')
        .attr('x', 1).attr('y', HEADER_H + i * ROW_H)
        .attr('width', d.width - 2).attr('height', ROW_H)
        .attr('fill', i % 2 === 0 ? 'rgba(255,255,255,0.015)' : 'transparent');

      // PK/FK indicator
      if (col.isPK) {
        node.append('text')
          .attr('class', 'pk-badge')
          .attr('x', 8).attr('y', y)
          .attr('dominant-baseline', 'central')
          .text('PK');
      } else if (col.isFK) {
        node.append('text')
          .attr('class', 'fk-badge')
          .attr('x', 8).attr('y', y)
          .attr('dominant-baseline', 'central')
          .text('FK');
      }

      // Col name
      node.append('text')
        .attr('class', 'col-name')
        .attr('x', col.isPK || col.isFK ? 32 : 12)
        .attr('y', y)
        .attr('dominant-baseline', 'central')
        .attr('fill', col.isPK ? 'var(--pk)' : col.isFK ? 'var(--fk)' : 'var(--text)')
        .text(truncate(col.name, col.isPK || col.isFK ? 16 : 20));

      // Type
      if (showTypes) {
        node.append('text')
          .attr('class', 'col-type')
          .attr('x', d.width - 8)
          .attr('y', y)
          .attr('dominant-baseline', 'central')
          .attr('text-anchor', 'end')
          .attr('fill', typeColor(col.type))
          .text(truncateType(col.type));
      }
    });

    // "...N more" label
    if (d.columns.length > MAX_VISIBLE_ROWS) {
      const extra = d.columns.length - MAX_VISIBLE_ROWS;
      node.append('text')
        .attr('x', d.width / 2).attr('y', h - 8)
        .attr('text-anchor', 'middle')
        .attr('font-family', 'JetBrains Mono, monospace')
        .attr('font-size', 10)
        .attr('fill', 'rgba(255,255,255,0.25)')
        .text(`+${extra} more columns`);
    }
  });

  svg.on('click', () => resetHighlight());

  function ticked() {
    linkLines.attr('d', linkPath);

    tableNodes.attr('transform', d => `translate(${d.x - d.width/2},${d.y - d.height/2})`);
  }

  // Store references for later use
  svg.property('_zoom', zoom);
  svg.property('_nodes', nodes);
  svg.property('_links', links);
  svg.property('_linkLines', linkLines);
  svg.property('_tableNodes', tableNodes);

  // Fit view after layout settles
  setTimeout(() => fitView(), 1200);
}

function linkPath(d) {
  const sx = d.source.x, sy = d.source.y;
  const tx = d.target.x, ty = d.target.y;
  const mx = (sx + tx) / 2, my = (sy + ty) / 2;
  return `M${sx},${sy} Q${mx + (ty - sy) * 0.15},${my - (tx - sx) * 0.15} ${tx},${ty}`;
}

function dragStart(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragging(event, d) {
  d.fx = event.x; d.fy = event.y;
}
function dragEnd(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// ── Highlight ──────────────────────────────────────────────────
function highlightTable(name) {
  if (highlightedTable === name) {
    resetHighlight();
    return;
  }
  highlightedTable = name;
  renderSidebar(document.getElementById('search').value);

  const svg = d3.select('#canvas');
  const nodes = svg.property('_nodes');
  const links = svg.property('_links');
  const linkLines = svg.property('_linkLines');
  const tableNodes = svg.property('_tableNodes');

  if (!nodes) return;

  // Related tables
  const related = new Set([name]);
  links.forEach(l => {
    const sn = l.source.name || l.source;
    const tn = l.target.name || l.target;
    if (sn === name) related.add(tn);
    if (tn === name) related.add(sn);
  });

  tableNodes.selectAll('rect.node-border')
    .attr('stroke', function() {
      const nName = d3.select(this.parentNode).datum().name;
      if (nName === name) return 'var(--accent)';
      if (related.has(nName)) return 'var(--accent2)';
      return 'rgba(255,255,255,0.05)';
    })
    .attr('stroke-width', function() {
      const nName = d3.select(this.parentNode).datum().name;
      return nName === name ? 2 : 1;
    });

  tableNodes.attr('opacity', d => related.has(d.name) ? 1 : 0.3);

  linkLines
    .attr('class', d => {
      const sn = d.source.name || d.source;
      const tn = d.target.name || d.target;
      return (sn === name || tn === name) ? 'link highlighted' : 'link';
    })
    .attr('opacity', d => {
      const sn = d.source.name || d.source;
      const tn = d.target.name || d.target;
      return (sn === name || tn === name) ? 1 : 0.1;
    });
}

function resetHighlight() {
  highlightedTable = null;
  renderSidebar(document.getElementById('search').value);

  const svg = d3.select('#canvas');
  const tableNodes = svg.property('_tableNodes');
  const linkLines = svg.property('_linkLines');
  if (!tableNodes) return;

  tableNodes.attr('opacity', 1)
    .selectAll('rect.node-border')
    .attr('stroke', 'rgba(255,255,255,0.08)')
    .attr('stroke-width', 1);

  linkLines.attr('class', 'link').attr('opacity', 1);
}

// ── Fit View ───────────────────────────────────────────────────
function fitView() {
  const svg = d3.select('#canvas');
  const zoom = svg.property('_zoom');
  const nodes = svg.property('_nodes');
  if (!zoom || !nodes || nodes.length === 0) return;

  const wrap = document.getElementById('canvas-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const pad = 60;

  const xs = nodes.map(n => n.x - n.width / 2);
  const xe = nodes.map(n => n.x + n.width / 2);
  const ys = nodes.map(n => n.y - n.height / 2);
  const ye = nodes.map(n => n.y + n.height / 2);

  const minX = Math.min(...xs), maxX = Math.max(...xe);
  const minY = Math.min(...ys), maxY = Math.max(...ye);
  const bw = maxX - minX, bh = maxY - minY;

  const scale = Math.min((W - pad * 2) / bw, (H - pad * 2) / bh, 1.5);
  const tx = (W - bw * scale) / 2 - minX * scale;
  const ty = (H - bh * scale) / 2 - minY * scale;

  svg.transition().duration(600).call(
    zoom.transform,
    d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
}

// ── Toggle types ───────────────────────────────────────────────
function toggleColsDisplay() {
  showTypes = !showTypes;
  const btn = document.getElementById('btn-cols');
  btn.textContent = showTypes ? 'Hide types' : 'Show types';
  if (schema) renderDiagram();
}

function toggleLayout(mode) {
  layoutMode = mode;
  if (schema) renderDiagram();
}

// ── Tooltip ────────────────────────────────────────────────────
function showTooltip(event, d) {
  const tooltip = document.getElementById('tooltip');
  const pks = d.columns.filter(c => c.isPK).map(c => c.name).join(', ') || '—';
  const fks = d.columns.filter(c => c.isFK).map(c => c.name).join(', ') || '—';
  const rels = schema.relations.filter(r => r.fromTable === d.name || r.toTable === d.name).length;

  tooltip.innerHTML = `
    <div class="tooltip-title">${d.name}</div>
    <div class="tooltip-row"><span class="tooltip-key">Columns</span><span class="tooltip-val">${d.columns.length}</span></div>
    <div class="tooltip-row"><span class="tooltip-key">PK</span><span class="tooltip-val">${pks}</span></div>
    <div class="tooltip-row"><span class="tooltip-key">FK cols</span><span class="tooltip-val">${fks}</span></div>
    <div class="tooltip-row"><span class="tooltip-key">Relations</span><span class="tooltip-val">${rels}</span></div>
  `;
  tooltip.style.left = (event.offsetX + 16) + 'px';
  tooltip.style.top = (event.offsetY - 10) + 'px';
  tooltip.classList.add('show');
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('show');
}

// ── Drag & Drop ────────────────────────────────────────────────
const dropBox = document.getElementById('drop-box');
dropBox.addEventListener('dragover', e => { e.preventDefault(); dropBox.classList.add('drag-over'); });
dropBox.addEventListener('dragleave', () => dropBox.classList.remove('drag-over'));
dropBox.addEventListener('drop', e => {
  e.preventDefault();
  dropBox.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = ev => processSQL(ev.target.result);
    reader.readAsText(file);
  }
});

// ── Helpers ────────────────────────────────────────────────────
function truncate(str, len) {
  return str.length > len ? str.slice(0, len - 1) + '…' : str;
}
function truncateType(type) {
  if (!type) return '';
  const t = type.toLowerCase().replace(/\s+with\s+time\s+zone/, ' tz').replace(/\s+without\s+time\s+zone/, '');
  const map = { 'character varying': 'varchar', 'timestamp tz': 'ts tz', 'timestamp': 'ts', 'boolean': 'bool', 'integer': 'int', 'bigint': 'bigint', 'numeric': 'num' };
  for (const [k, v] of Object.entries(map)) {
    if (t.startsWith(k)) return v;
  }
  return t.length > 10 ? t.slice(0,9)+'…' : t;
}

// ── Resize ─────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  if (!schema) return;
  const wrap = document.getElementById('canvas-wrap');
  d3.select('#canvas').attr('width', wrap.clientWidth).attr('height', wrap.clientHeight);
});
</script>
