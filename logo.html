<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DigiOne.ai — Logo System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #d8d8d8;
        font-family: "Inter", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 2px;
      }

      .row {
        display: flex;
        width: 100%;
        gap: 2px;
        align-items: stretch;
      }

      .panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 64px 48px 52px;
      }

      .panel.white    { background: #ffffff; }
      .panel.black    { background: #0a0a0a; }
      .panel.offwhite { background: #f5f5f3; }
      .panel.offblack { background: #0d0d0d; }

      .panel-label {
        margin-top: 28px;
        font-size: 9px;
        font-weight: 500;
        letter-spacing: 2.5px;
        text-transform: uppercase;
      }

      .panel.white .panel-label,
      .panel.offwhite .panel-label {
        color: rgba(0, 0, 0, 0.18);
      }

      .panel.black .panel-label,
      .panel.offblack .panel-label {
        color: rgba(255, 255, 255, 0.18);
      }

      .h-div {
        width: 100%;
        height: 1px;
        background: #cacaca;
        flex-shrink: 0;
      }

      .v-div {
        width: 1px;
        flex-shrink: 0;
        background: #1c1c1c;
      }

      /* ═══ LOGO ═══ */
      .logo {
        display: inline-flex;
        align-items: flex-end;
        gap: 13px;
      }

      .logo.sm {
        gap: 9px;
      }

      .wordmark {
        display: flex;
        align-items: baseline;
        padding-bottom: 2px;
      }

      .w-name {
        font-family: "Outfit", sans-serif;
        font-size: 27px;
        font-weight: 600;
        letter-spacing: -0.3px;
        line-height: 1;
      }

      .w-sup {
        font-family: "Outfit", sans-serif;
        font-size: 16px;
        font-weight: 500;
        opacity: 0.35;
        margin-left: 2px;
        letter-spacing: 0.06em;
        line-height: 1;
      }

      .on-light .w-name,
      .on-light .w-sup {
        color: #0a0a0a;
      }

      .on-dark .w-name,
      .on-dark .w-sup {
        color: #ffffff;
      }

      .logo.sm .w-name {
        font-size: 17px;
        letter-spacing: -0.2px;
      }

      .logo.sm .w-sup {
        font-size: 9px;
      }

      /* ═══ SIZE ROW ═══ */
      .size-row {
        display: flex;
        align-items: flex-end;
        gap: 40px;
      }

      /* ═══ APP ICON ═══ */
      .app-wrap {
        border-radius: 14px;
        width: 60px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .app-wrap.light {
        background: #ffffff;
        box-shadow: 0 0 0 1px #e0e0e0;
      }

      .app-wrap.dark {
        background: #0a0a0a;
      }

      .app-wrap.dark-outlined {
        background: #0a0a0a;
        box-shadow: 0 0 0 1px #222222;
      }
    </style>
  </head>

  <body>

    <!-- ═══ ROW 1: MAIN LOGO ═══ -->
    <div class="row">

      <div class="panel white">
        <div class="logo on-light">
          <svg width="42" height="42" viewBox="0 0 44 44" fill="none">
            <rect x="4" y="5"  width="36" height="9" rx="4.5" fill="#0a0a0a" />
            <rect x="4" y="18" width="24" height="9" rx="4.5" fill="#0a0a0a" />
            <rect x="4" y="31" width="17" height="9" rx="4.5" fill="#0a0a0a" />
            <rect x="32" y="18" width="8" height="22" rx="4"  fill="#0a0a0a" />
            <circle cx="36" cy="35" r="2.5" fill="#E83A2E" />
          </svg>
          <div class="wordmark">
            <span class="w-name">DigiOne</span>
            <span class="w-sup">.ai</span>
          </div>
        </div>
        <div class="panel-label">Light</div>
      </div>

      <div class="v-div"></div>

      <div class="panel black">
        <div class="logo on-dark">
          <svg width="42" height="42" viewBox="0 0 44 44" fill="none">
            <rect x="4" y="5"  width="36" height="9" rx="4.5" fill="#ffffff" />
            <rect x="4" y="18" width="24" height="9" rx="4.5" fill="#ffffff" />
            <rect x="4" y="31" width="17" height="9" rx="4.5" fill="#ffffff" />
            <rect x="32" y="18" width="8" height="22" rx="4"  fill="#ffffff" />
            <circle cx="36" cy="35" r="2.5" fill="#FF5549" />
          </svg>
          <div class="wordmark">
            <span class="w-name">DigiOne</span>
            <span class="w-sup">.ai</span>
          </div>
        </div>
        <div class="panel-label">Dark</div>
      </div>

    </div>

    <div class="h-div"></div>

    <!-- ═══ ROW 2: SIZES + APP ICONS ═══ -->
    <div class="row">

      <div class="panel offwhite" style="padding: 52px 40px 44px;">
        <div class="size-row">

          <!-- Default size -->
          <div class="logo on-light">
            <svg width="42" height="42" viewBox="0 0 44 44" fill="none">
              <rect x="4" y="5"  width="36" height="9" rx="4.5" fill="#0a0a0a" />
              <rect x="4" y="18" width="24" height="9" rx="4.5" fill="#0a0a0a" />
              <rect x="4" y="31" width="17" height="9" rx="4.5" fill="#0a0a0a" />
              <rect x="32" y="18" width="8" height="22" rx="4"  fill="#0a0a0a" />
              <circle cx="36" cy="35" r="2.5" fill="#E83A2E" />
            </svg>
            <div class="wordmark">
              <span class="w-name">DigiOne</span>
              <span class="w-sup">.ai</span>
            </div>
          </div>

          <!-- Small size -->
          <div class="logo on-light sm">
            <svg width="28" height="28" viewBox="0 0 44 44" fill="none">
              <rect x="4" y="5"  width="36" height="9" rx="4.5" fill="#0a0a0a" />
              <rect x="4" y="18" width="24" height="9" rx="4.5" fill="#0a0a0a" />
              <rect x="4" y="31" width="17" height="9" rx="4.5" fill="#0a0a0a" />
              <rect x="32" y="18" width="8" height="22" rx="4"  fill="#0a0a0a" />
              <circle cx="36" cy="35" r="2.5" fill="#E83A2E" />
            </svg>
            <div class="wordmark">
              <span class="w-name">DigiOne</span>
              <span class="w-sup">.ai</span>
            </div>
          </div>

          <!-- App icon dark -->
          <div class="app-wrap dark">
            <svg width="34" height="34" viewBox="0 0 44 44" fill="none">
              <rect x="4" y="5"  width="36" height="9" rx="4.5" fill="#ffffff" />
              <rect x="4" y="18" width="24" height="9" rx="4.5" fill="#ffffff" />
              <rect x="4" y="31" width="17" height="9" rx="4.5" fill="#ffffff" />
              <rect x="32" y="18" width="8" height="22" rx="4"  fill="#ffffff" />
              <circle cx="36" cy="35" r="2.5" fill="#FF5549" />
            </svg>
          </div>

          <!-- App icon light -->
          <div class="app-wrap light">
            <svg width="34" height="34" viewBox="0 0 44 44" fill="none">
              <rect x="4" y="5"  width="36" height="9" rx="4.5" fill="#0a0a0a" />
              <rect x="4" y="18" width="24" height="9" rx="4.5" fill="#0a0a0a" />
              <rect x="4" y="31" width="17" height="9" rx="4.5" fill="#0a0a0a" />
              <rect x="32" y="18" width="8" height="22" rx="4"  fill="#0a0a0a" />
              <circle cx="36" cy="35" r="2.5" fill="#E83A2E" />
            </svg>
          </div>

        </div>
        <div class="panel-label" style="margin-top: 28px;">Default · Small · App Icons</div>
      </div>

      <div class="v-div"></div>

      <div class="panel offblack" style="padding: 52px 40px 44px;">
        <div class="size-row">

          <!-- Default size dark -->
          <div class="logo on-dark">
            <svg width="42" height="42" viewBox="0 0 44 44" fill="none">
              <rect x="4" y="5"  width="36" height="9" rx="4.5" fill="#ffffff" />
              <rect x="4" y="18" width="24" height="9" rx="4.5" fill="#ffffff" />
              <rect x="4" y="31" width="17" height="9" rx="4.5" fill="#ffffff" />
              <rect x="32" y="18" width="8" height="22" rx="4"  fill="#ffffff" />
              <circle cx="36" cy="35" r="2.5" fill="#FF5549" />
            </svg>
            <div class="wordmark">
              <span class="w-name">DigiOne</span>
              <span class="w-sup">.ai</span>
            </div>
          </div>

          <!-- Small size dark -->
          <div class="logo on-dark sm">
            <svg width="28" height="28" viewBox="0 0 44 44" fill="none">
              <rect x="4" y="5"  width="36" height="9" rx="4.5" fill="#ffffff" />
              <rect x="4" y="18" width="24" height="9" rx="4.5" fill="#ffffff" />
              <rect x="4" y="31" width="17" height="9" rx="4.5" fill="#ffffff" />
              <rect x="32" y="18" width="8" height="22" rx="4"  fill="#ffffff" />
              <circle cx="36" cy="35" r="2.5" fill="#FF5549" />
            </svg>
            <div class="wordmark">
              <span class="w-name">DigiOne</span>
              <span class="w-sup">.ai</span>
            </div>
          </div>

          <!-- App icon dark on dark -->
          <div class="app-wrap dark-outlined">
            <svg width="34" height="34" viewBox="0 0 44 44" fill="none">
              <rect x="4" y="5"  width="36" height="9" rx="4.5" fill="#ffffff" />
              <rect x="4" y="18" width="24" height="9" rx="4.5" fill="#ffffff" />
              <rect x="4" y="31" width="17" height="9" rx="4.5" fill="#ffffff" />
              <rect x="32" y="18" width="8" height="22" rx="4"  fill="#ffffff" />
              <circle cx="36" cy="35" r="2.5" fill="#FF5549" />
            </svg>
          </div>

          <!-- App icon light on dark -->
          <div class="app-wrap light">
            <svg width="34" height="34" viewBox="0 0 44 44" fill="none">
              <rect x="4" y="5"  width="36" height="9" rx="4.5" fill="#0a0a0a" />
              <rect x="4" y="18" width="24" height="9" rx="4.5" fill="#0a0a0a" />
              <rect x="4" y="31" width="17" height="9" rx="4.5" fill="#0a0a0a" />
              <rect x="32" y="18" width="8" height="22" rx="4"  fill="#0a0a0a" />
              <circle cx="36" cy="35" r="2.5" fill="#E83A2E" />
            </svg>
          </div>

        </div>
        <div class="panel-label" style="margin-top: 28px;">Default · Small · App Icons</div>
      </div>

    </div>

  </body>
</html>
