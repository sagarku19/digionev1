# Dependabot — automated dependency updates + vulnerability PRs.
# Free on private repos. Its PRs flow through the CI workflow above.
version: 2
updates:
  # npm dependencies (next, sharp, @aws-sdk/*, @supabase/*, cashfree, etc.)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies]
    # Batch low-risk minor/patch bumps into one PR to avoid noise; majors
    # come as individual PRs so breaking changes get reviewed on their own.
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    # TypeScript 7.x is the new native (Go) compiler — a breaking major on a
    # preview toolchain that our Next 16 / TS-5 stack isn't ready for. Stay on 5.x
    # (minor/patch still flow through). Revisit when the toolchain supports TS 7.
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Keep the GitHub Actions used in workflows/ up to date too.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, github-actions]
